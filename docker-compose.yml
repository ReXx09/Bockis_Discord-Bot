version: '3'
services:
  bot:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      STATUS_CHANNEL_ID: ${STATUS_CHANNEL_ID}
      DISCORD_NOTIFICATION_CHANNEL: ${DISCORD_NOTIFICATION_CHANNEL}
      DISCORD_STATUS_RENDER_MODE: ${DISCORD_STATUS_RENDER_MODE:-auto}
      CHANNEL_STATUS_INDICATOR: ${CHANNEL_STATUS_INDICATOR:-true}
      GUILD_ID: ${GUILD_ID}
      SERVICE_CATEGORY_NAME: ${SERVICE_CATEGORY_NAME}
      MONITORED_SERVICES: ${MONITORED_SERVICES}
      UPTIME_KUMA_URL: ${UPTIME_KUMA_URL}
      UPTIME_KUMA_API_KEY: ${UPTIME_KUMA_API_KEY}
      STATUS_PAGE_SLUG: ${STATUS_PAGE_SLUG}
      CLOUDFLARE_PUBLIC_URL: ${CLOUDFLARE_PUBLIC_URL}
      UPDATE_INTERVAL: ${UPDATE_INTERVAL:-300000}
      WEB_PORT: 3000
      DB_DIALECT: sqlite
      DB_STORAGE: /app/data/status.db
      DASHBOARD_PASSWORD: ${DASHBOARD_PASSWORD}
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
